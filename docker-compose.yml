services:
  postgres:
    image: postgres:16-alpine
    container_name: openwhoop-pg
    environment:
      POSTGRES_USER: openwhoop
      POSTGRES_PASSWORD: openwhoop
      POSTGRES_DB: openwhoop
    ports:
      - "5432:5432"
    volumes:
      - openwhoop_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openwhoop -d openwhoop"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  openwhoop_pgdata:
